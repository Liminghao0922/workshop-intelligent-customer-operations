site_name: Intelligent Customer Operations
site_description: Build AI customer operations agents with Azure AI Foundry and Microsoft Fabric IQ
site_author: Microsoft
repo_name: workshop-intelligent-customer-operations
repo_url: https://github.com/YOUR-ORG/workshop-intelligent-customer-operations
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: blue
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Workshop:
      - Overview: modules/module00-overview/index.md
      - Prerequisites & Setup:
          - Overview: modules/module01-environment-setup/index.md
          - Exercise 1 - Azure Environment: modules/module01-environment-setup/exercise01-azure-environment.md
          - Exercise 2 - Fabric Workspace: modules/module01-environment-setup/exercise02-fabric-workspace.md
          - Exercise 3 - AI Foundry Project: modules/module01-environment-setup/exercise03-ai-foundry-project.md
          - Summary: modules/module01-environment-setup/summary.md
      - Knowledge Foundation with Fabric IQ:
          - Overview: modules/module02-knowledge-foundation/index.md
          - Exercise 1 - Prepare Data: modules/module02-knowledge-foundation/exercise01-prepare-data.md
          - Exercise 2 - Configure Fabric IQ: modules/module02-knowledge-foundation/exercise02-configure-fabric-iq.md
          - Exercise 3 - Validate Knowledge Answers: modules/module02-knowledge-foundation/exercise03-validate-knowledge.md
          - Summary: modules/module02-knowledge-foundation/summary.md
      - Build AI Agent with Azure AI Foundry:
          - Overview: modules/module03-build-agent/index.md
          - Exercise 1 - Create Agent: modules/module03-build-agent/exercise01-create-agent.md
          - Exercise 2 - Configure Instructions: modules/module03-build-agent/exercise02-configure-instructions.md
          - Exercise 3 - Connect Knowledge: modules/module03-build-agent/exercise03-connect-knowledge.md
          - Summary: modules/module03-build-agent/summary.md
      - Business Actions & Tool Calling:
          - Overview: modules/module04-business-actions/index.md
          - Exercise 1 - Business API: modules/module04-business-actions/exercise01-business-api.md
          - Exercise 2 - Tool Definition: modules/module04-business-actions/exercise02-tool-definition.md
