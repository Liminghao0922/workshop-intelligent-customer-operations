site_name: Intelligent Customer Operations
site_description: Build a grounded voice support and post-call operations lifecycle with Microsoft Foundry
site_author: Microsoft
repo_name: workshop-intelligent-customer-operations
repo_url: https://github.com/YOUR-ORG/workshop-intelligent-customer-operations
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.action.edit
    - search.highlight
    - search.suggest
  palette:
    - scheme: default
      primary: blue
      accent: blue
  icon:
    repo: fontawesome/brands/github

markdown_extensions: [admonition, attr_list, pymdownx.superfences, pymdownx.details, {pymdownx.tabbed: {alternate_style: true}}, {pymdownx.tasklist: {custom_checkbox: true}}, {toc: {permalink: true}}]

extra_javascript:
    - "https://unpkg.com/mermaid@11/dist/mermaid.min.js"
    - javascripts/mermaid.js

nav:
  - Home: index.md
  - Workshop:
      - Overview: modules/module00-overview/index.md
      - Shared Environment Setup:
          - Overview: modules/module01-environment-setup/index.md
          - Exercise 1 - Azure Environment: modules/module01-environment-setup/exercise01-azure-environment.md
          - Exercise 2 - Azure AI Search Service: modules/module01-environment-setup/exercise02-azure-ai-search-service.md
          - Exercise 3 - AI Foundry Project: modules/module01-environment-setup/exercise03-ai-foundry-project.md
          - Summary: modules/module01-environment-setup/summary.md
      - Part 1 - Knowledge Agent:
          - Overview: modules/module02-knowledge-agent/index.md
          - Exercise 1 - Prepare Knowledge: modules/module02-knowledge-agent/exercise01-prepare-knowledge.md
          - Exercise 2 - Create Agent: modules/module02-knowledge-agent/exercise02-create-agent.md
          - Exercise 3 - Validate RAG: modules/module02-knowledge-agent/exercise03-validate-rag.md
          - Summary: modules/module02-knowledge-agent/summary.md
      - Part 2 - Voice Channel:
          - Overview: modules/module03-voice-channel/index.md
          - Exercise 1 - Deploy Gateway: modules/module03-voice-channel/exercise01-deploy-gateway.md
          - Exercise 2 - Connect ACS: modules/module03-voice-channel/exercise02-connect-acs.md
          - Exercise 3 - Test Call: modules/module03-voice-channel/exercise03-test-call.md
          - Summary: modules/module03-voice-channel/summary.md
      - Part 3 - Post-call Operations:
          - Overview: modules/module04-post-call-analysis/index.md
          - Exercise 1 - Create Analysis Agent: modules/module04-post-call-analysis/exercise01-create-analysis-agent.md
          - Exercise 2 - Call-ended Event: modules/module04-post-call-analysis/exercise02-call-ended-event.md
          - Exercise 3 - Configure Dynamics: modules/module04-post-call-analysis/exercise03-configure-dynamics.md
          - Exercise 4 - Validate Lifecycle: modules/module04-post-call-analysis/exercise04-validate-lifecycle.md
          - Summary: modules/module04-post-call-analysis/summary.md
  - Architecture:
      - Solution Architecture: architecture/solution-architecture.md
      - Sequence Flow: architecture/sequence-flow.md
      - Data Flow: architecture/data-flow.md
      - Security & Governance: architecture/security-governance.md
      - Observability & Evaluation: architecture/observability-evaluation.md
      - Deployment Topology: architecture/deployment-topology.md
  - Demos:
      - Executive Demo: demos/executive-demo.md
      - Technical Demo: demos/technical-demo.md
      - Customer Demo: demos/customer-demo.md
  - Resources:
      - Prompt Assets: resources/prompt-assets.md
      - Sample Data: resources/sample-data.md
      - Troubleshooting: resources/troubleshooting.md
      - FAQ: resources/faq.md
  - Instructor Guide:
      - Delivery Guide: instructor/delivery-guide.md
      - Timing Guide: instructor/timing-guide.md
      - Demo Script: instructor/demo-script.md
