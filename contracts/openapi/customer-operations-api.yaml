openapi: 3.0.3
info:
  title: Customer Operations Gateway API
  version: 0.2.0
paths:
  /healthz:
    get:
      summary: Health check
      responses:
        "200":
          description: Healthy
  /api/calls:
    get:
      summary: List call sessions
      responses:
        "200":
          description: Call list
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CallRecord"
  /api/calls/{id}:
    get:
      summary: Get call session by ID
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Call record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallRecord"
        "404":
          description: Call not found
  /api/dev/simulate-call:
    post:
      summary: Simulate inbound call (local/demo)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                language:
                  type: string
                  enum: [en, ja, zh]
              required: [language]
      responses:
        "200":
          description: Simulated call record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CallRecord"
  /api/foundry/tools/create-ticket:
    post:
      summary: Create escalation ticket
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TicketCreateRequest"
      responses:
        "200":
          description: Created ticket
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Ticket"
  /api/admin/analyze/{callId}:
    post:
      summary: Submit post-call analysis job
      parameters:
        - in: path
          name: callId
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Analysis submission result
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    CallTurn:
      type: object
      properties:
        speaker:
          type: string
        text:
          type: string
        at:
          type: string
      required: [speaker, text, at]
    Ticket:
      type: object
      properties:
        id:
          type: string
        callId:
          type: string
          nullable: true
        priority:
          type: string
        reason:
          type: string
        summary:
          type: string
        createdAt:
          type: string
        status:
          type: string
      required: [id, priority, reason, summary, createdAt, status]
    TicketCreateRequest:
      type: object
      properties:
        callId:
          type: string
        reason:
          type: string
        summary:
          type: string
        priority:
          type: string
      required: [reason, summary]
    CallRecord:
      type: object
      properties:
        id:
          type: string
        status:
          type: string
        language:
          type: string
        customerPhoneNumber:
          type: string
        acsCallConnectionId:
          type: string
        recordingId:
          type: string
          nullable: true
        recordingState:
          type: string
          nullable: true
        startedAt:
          type: string
        updatedAt:
          type: string
        completedAt:
          type: string
          nullable: true
        transcript:
          type: array
          items:
            $ref: "#/components/schemas/CallTurn"
        analyticsStatus:
          type: string
        ticket:
          $ref: "#/components/schemas/Ticket"
        postCallResult:
          type: object
          nullable: true
          additionalProperties: true
        foundryConversationId:
          type: string
          nullable: true
      required: [id, status, language, customerPhoneNumber, acsCallConnectionId, startedAt, updatedAt, transcript, analyticsStatus]
