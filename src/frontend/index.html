<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Customer Operations Demo UI</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; max-width: 900px; }
    textarea { width: 100%; height: 100px; }
    button { margin-top: 1rem; padding: 0.5rem 1rem; }
    pre { background: #f5f5f5; padding: 1rem; border-radius: 6px; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>Customer Operations Demo UI</h1>
  <p>API: <code>http://localhost:5077/api/chat</code></p>
  <textarea id="message">Can you check the status of service request SR-1001?</textarea>
  <br />
  <button id="sendBtn">Send</button>
  <h2>Response</h2>
  <pre id="output"></pre>
  <script>
    const output = document.getElementById("output");
    document.getElementById("sendBtn").addEventListener("click", async () => {
      const message = document.getElementById("message").value;
      const payload = { message, sessionId: "demo-session-ui" };
      const resp = await fetch("http://localhost:5077/api/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await resp.json();
      output.textContent = JSON.stringify(data, null, 2);
    });
  </script>
</body>
</html>
